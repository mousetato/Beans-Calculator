<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡豆价格计算器</title>
    <style>
        :root {
            --dark-coffee: #4B3832;
            --medium-roast: #6F4E37;
            --latte: #BE9B7B;
            --cream: #FFF4E6;
            --accent: #D17A22;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #F8F5F2;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--dark-coffee);
        }

        .card, .history-card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .header { background: var(--dark-coffee); color: var(--cream); padding: 15px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        .content { padding: 20px; }
        
        /* 输入区样式 */
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--medium-roast); margin-bottom: 6px; font-weight: bold; }
        input {
            width: 100%; padding: 12px; border: 2px solid var(--latte);
            border-radius: 8px; background: var(--cream); box-sizing: border-box;
            font-size: 1rem; color: var(--dark-coffee); outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* 快捷克数按钮 */
        .chips-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip {
            padding: 6px 12px; background: #eee; border-radius: 20px;
            font-size: 0.75rem; color: var(--medium-roast); cursor: pointer;
            transition: all 0.2s; border: 1px solid transparent;
        }
        .chip:hover { background: var(--latte); color: white; }
        .chip.active { background: var(--accent); color: white; }

        /* 结果显示区 */
        .result-group { 
            background: var(--cream); padding: 15px; border-radius: 12px; 
            margin-top: 20px; border: 1px dashed var(--latte);
        }
        .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .result-row:last-child { margin-bottom: 0; }
        .value-text { color: var(--accent); font-weight: 800; font-size: 1.5rem; }

        .save-btn {
            width: 100%; padding: 14px; background: var(--dark-coffee); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
            margin-top: 15px; font-size: 1rem; transition: opacity 0.2s;
        }
        .save-btn:active { opacity: 0.8; }

        /* 历史记录表格 */
        .history-card { padding: 20px; box-sizing: border-box; }
        .history-card h3 { margin-top: 0; font-size: 1rem; color: var(--medium-roast); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #999; font-weight: normal; padding: 10px 5px; }
        td { padding: 12px 5px; border-bottom: 1px solid #f9f9f9; }
        .del-btn { color: #cc7a6f; cursor: pointer; background: none; border: none; font-size: 0.8rem; }
    </style>
    <script>
  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW 注册成功'))
        .catch(err => console.log('SW 注册失败', err));
    });
  }
    </script>
</head>
<body>

<div class="card">
    <div class="header"><h2>☕ Beans Calculator</h2></div>
    <div class="content">
        <div class="field">
            <label>咖啡豆名称</label>
            <input type="text" id="name" placeholder="例如：埃塞俄比亚 花魁">
        </div>
        <div class="field">
            <label>价格 (元)</label>
            <input type="number" id="price" oninput="calculate()" placeholder="0.00">
        </div>
        <div class="field">
            <label>总重量 (g)</label>
            <input type="number" id="grams" oninput="manualInputGrams()" placeholder="输入或选下方规格">
            <div class="chips-group">
                <div class="chip" onclick="selectGrams(200, this)">200g</div>
                <div class="chip" onclick="selectGrams(227, this)">227g</div>
                <div class="chip" onclick="selectGrams(250, this)">250g</div>
                <div class="chip" onclick="selectGrams(454, this)">454g</div>
                <div class="chip" onclick="selectGrams(500, this)">500g</div>
            </div>
        </div>
        <div class="field">
            <label>单杯粉量 (g)</label>
            <input type="number" id="dose" value="16" oninput="calculate()">
        </div>

        <div class="result-group">
            <div class="result-row">
                <span>预计出品</span>
                <div><span id="cups" class="value-text">0</span><small> 杯</small></div>
            </div>
            <div class="result-row">
                <span>单杯价格</span>
                <div><span id="cost" class="value-text">0.00</span><small> 元</small></div>
            </div>
        </div>
        
        <button class="save-btn" onclick="saveRecord()">保存此条计算结果</button>
    </div>
</div>

<div class="history-card">
    <h3>📜 历史对比记录</h3>
    <table id="historyTable">
        <thead>
            <tr><th>豆子名称</th><th>杯数</th><th>单杯价</th><th>操作</th></tr>
        </thead>
        <tbody id="historyBody">
            </tbody>
    </table>
</div>

<script>
    // 初始化时加载历史数据
    window.onload = renderHistory;

    function calculate() {
        const p = parseFloat(document.getElementById('price').value) || 0;
        const g = parseFloat(document.getElementById('grams').value) || 0;
        const d = parseFloat(document.getElementById('dose').value) || 0;
        
        // 杯数：去尾法取整
        const cups = d > 0 ? Math.floor(g / d) : 0;
        // 单杯价格：价格/杯数
        const cost = cups > 0 ? (p / cups).toFixed(2) : "0.00";

        document.getElementById('cups').innerText = cups;
        document.getElementById('cost').innerText = cost;
    }

    // 快捷克数选择逻辑
    function selectGrams(val, el) {
        document.getElementById('grams').value = val;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        calculate();
    }

    // 手动输入克数时，清除快捷按钮的高亮
    function manualInputGrams() {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        calculate();
    }

    // 保存记录到本地
    function saveRecord() {
        const name = document.getElementById('name').value || '未命名的豆子';
        const cups = document.getElementById('cups').innerText;
        const cost = document.getElementById('cost').innerText;

        if (cups === "0") {
            alert("请输入有效的数据后再保存");
            return;
        }

        const record = { id: Date.now(), name, cups, cost };
        const history = JSON.parse(localStorage.getItem('coffeeRecords') || '[]');
        history.unshift(record);
        localStorage.setItem('coffeeRecords', JSON.stringify(history));
        
        renderHistory();
        // 清空名称输入框方便下一次输入
        document.getElementById('name').value = '';
    }

    // 渲染历史记录列表
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('coffeeRecords') || '[]');
        const body = document.getElementById('historyBody');
        body.innerHTML = history.map(item => `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td>${item.cups}杯</td>
                <td>¥${item.cost}</td>
                <td><button class="del-btn" onclick="deleteRecord(${item.id})">删除</button></td>
            </tr>
        `).join('');
    }

    // 删除单条记录
    function deleteRecord(id) {
        if (!confirm('确定删除这条记录吗？')) return;
        let history = JSON.parse(localStorage.getItem('coffeeRecords') || '[]');
        history = history.filter(item => item.id !== id);
        localStorage.setItem('coffeeRecords', JSON.stringify(history));
        renderHistory();
    }
</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4B3832">


</body>
</html>
